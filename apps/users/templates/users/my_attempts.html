{% extends "base.html" %}
{% block title %}My Attempts{% endblock title %}

{% block main %}
<main class="page">
    <section class="stack">
        <div class="card stack">
            <h1>My Attempts</h1>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Quiz</th>
                        <th>When</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody>
                    {% for a in attempts %}
                        <tr>
                            <td>{{ a.quiz.title }}</td>
                            <td>{{ a.submittedAt }}</td>
                            <td>{{ a.score }}/{{ a.maxScore }}</td>
                        </tr>
                    {% empty %}
                        <tr>
                            <td colspan="3" class="empty-state">No attempts yet.</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </section>
</main>
{% endblock main %}
